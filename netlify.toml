[build]
  publish = "."

# Redirect Netlify subdomain to custom domain
[[redirects]]
  from = "https://whimsical-gumdrop-e0adcb.netlify.app/*"
  to = "https://abrahamspring.co.uk/:splat"
  status = 301
  force = true

# Clean URL redirects
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/podcast"
  to = "/podcast.html"
  status = 200

# Force fresh favicon (no long cache)
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
