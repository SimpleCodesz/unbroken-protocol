<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — The Unbroken Protocol</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #1D1D1F;
      color: #F5F5F7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .error-page { max-width: 480px; }
    .error-code {
      font-size: 120px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #C47A2A;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    p {
      color: #A1A1A6;
      font-size: 17px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #C47A2A;
      color: #fff;
      padding: 14px 32px;
      border-radius: 980px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #a8661f; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The page you're looking for may have moved or no longer exists. Let's get you back on track.</p>
    <a href="/" class="btn">Back to The Unbroken Protocol</a>
  </div>
</body>
</html>
